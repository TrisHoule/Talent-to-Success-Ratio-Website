<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talent-to-Success Player Database</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .modal-transition { transition: opacity 0.25s ease, transform 0.25s ease; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-xl font-bold tracking-tight bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                Talent-to-Success Database
            </h1>
            <div class="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto justify-end">
                <nav class="flex gap-1 bg-slate-950 p-1 rounded-lg border border-slate-800 w-full sm:w-auto justify-center">
                    <button onclick="switchTab('Active Prospects')" id="btn-ActiveProspects" class="px-3 py-1.5 text-xs sm:text-sm font-medium rounded-md transition nav-btn bg-blue-600 text-white">Active Prospects</button>
                    <button onclick="switchTab('Active Major Leaguers')" id="btn-ActiveMajorLeaguers" class="px-3 py-1.5 text-xs sm:text-sm font-medium rounded-md transition nav-btn text-slate-400 hover:text-slate-200">Active MLB</button>
                    <button onclick="switchTab('Historical Archive (Inactives)')" id="btn-HistoricalArchive" class="px-3 py-1.5 text-xs sm:text-sm font-medium rounded-md transition nav-btn text-slate-400 hover:text-slate-200">Historical Archive</button>
                </nav>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="mb-6 flex justify-between items-center">
            <h2 id="current-tab-title" class="text-2xl font-semibold text-slate-200">Active Prospects</h2>
            <div id="loading-indicator" class="text-sm text-blue-400 animate-pulse">Syncing data...</div>
        </div>
        <div id="player-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
    </main>

    <!-- Modal remains the same structure -->
    <div id="player-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm hidden opacity-0 modal-transition">
        <div class="bg-slate-900 border border-slate-800 rounded-xl w-full max-w-2xl overflow-hidden shadow-2xl transform scale-95 modal-transition" id="modal-card">
            <div id="modal-accent-bar" class="h-1.5 w-full"></div>
            <div class="p-6">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h3 id="modal-player-name" class="text-2xl font-bold text-white"></h3>
                        <span id="modal-player-tier" class="inline-block mt-2 px-2.5 py-1 text-xs font-bold rounded border"></span>
                    </div>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-white p-1 rounded-lg hover:bg-slate-800 transition cursor-pointer">✕</button>
                </div>
                <div id="modal-player-notes" class="text-sm text-slate-300 leading-relaxed bg-slate-950 p-4 rounded-lg border border-slate-800 max-h-60 overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <script>
        const BASE_API_URL = 'https://sheetdb.io/api/v1/im4sx1l1jcszt';
        let currentTab = 'Active Prospects';
        let localPlayersCache = [];

       // Resolves the color by cleaning the input and performing a fuzzy match on the tier name
function getTierColor(tabName, tierString) {
    const defaultColor = '#475569'; // Slate 600 default
    if (!tierString) return defaultColor;
    
    // Normalize string to ignore case and parenthetical descriptions
    const cleanTier = tierString.toLowerCase().replace(/\(.*?\)/g, '').trim();
    const lowerTab = tabName.toLowerCase();

    // 1. ACTIVE PROSPECTS
    if (lowerTab.includes('prospects')) {
        if (cleanTier.includes('tier 1')) return '#E2F0D9';
        if (cleanTier.includes('tier 2')) return '#E6F4EA';
        if (cleanTier.includes('tier 3')) return '#FFF2CC';
        if (cleanTier.includes('tier 4')) return '#FCE8E6';
        if (cleanTier.includes('tier 5')) return '#F1F3F4';
        if (cleanTier.includes('tier 6')) return '#E8F0FE';
    }
    
    // 2. MAJOR LEAGUERS
    if (lowerTab.includes('major leaguers') || lowerTab.includes('mlb')) {
        if (cleanTier.includes('tier 1')) return '#D0E1FD';
        if (cleanTier.includes('tier 2')) return '#E1F5FE';
        if (cleanTier.includes('tier 3')) return '#EAE8FF';
        if (cleanTier.includes('tier 4')) return '#FFF3E0';
        if (cleanTier.includes('tier 5')) return '#F5F5F5';
        if (cleanTier.includes('tier 6')) return '#EFEBE9';
    }

    // 3. HISTORICAL ARCHIVE
    if (lowerTab.includes('historical') || lowerTab.includes('archive') || lowerTab.includes('inactive')) {
        if (cleanTier.includes('tier 1')) return '#E2E3E5';
        if (cleanTier.includes('tier 2')) return '#EBECEF';
        if (cleanTier.includes('tier 3')) return '#FDF6E2';
        if (cleanTier.includes('tier 4')) return '#F4F5F7';
        if (cleanTier.includes('tier 5')) return '#F8F9FA';
        if (cleanTier.includes('tier 6')) return '#FAFAFA';
        if (cleanTier.includes('tier 7')) return '#FFFFFF';
    }

    return defaultColor;
}

        async function loadTabData(tabName) {
            const grid = document.getElementById('player-grid');
            grid.innerHTML = '';
            localPlayersCache = [];
            try {
                const response = await fetch(`${BASE_API_URL}?sheet=${encodeURIComponent(tabName)}`);
                const data = await response.json();
                localPlayersCache = data;
                renderPlayerBadges();
            } catch (error) { console.error(error); }
        }

        function renderPlayerBadges() {
            const grid = document.getElementById('player-grid');
            localPlayersCache.forEach((player, index) => {
                const hexColor = getTierColor(currentTab, player.Tier);
                const badge = document.createElement('div');
                badge.className = `p-4 bg-slate-900 border border-slate-800 rounded-xl hover:scale-[1.02] cursor-pointer transition-all duration-200 flex flex-col h-24`;
                badge.style.borderTop = `4px solid ${hexColor}`;
                badge.onclick = () => openModal(index);
                badge.innerHTML = `<div class="font-semibold text-slate-100 text-sm line-clamp-2">${player.Player}</div>`;
                grid.appendChild(badge);
            });
        }

        function openModal(index) {
            const player = localPlayersCache[index];
            const hexColor = getTierColor(currentTab, player.Tier);
            document.getElementById('modal-accent-bar').style.backgroundColor = hexColor;
            document.getElementById('modal-player-name').innerText = player.Player;
            document.getElementById('modal-player-tier').innerText = player.Tier;
            document.getElementById('modal-player-notes').innerText = player.Notes || 'No notes.';
            document.getElementById('player-modal').classList.remove('hidden');
            setTimeout(() => document.getElementById('player-modal').classList.remove('opacity-0'), 10);
        }

        function closeModal() {
            document.getElementById('player-modal').classList.add('opacity-0');
            setTimeout(() => document.getElementById('player-modal').classList.add('hidden'), 250);
        }

        function switchTab(tabName) {
            currentTab = tabName;
            document.getElementById('current-tab-title').innerText = tabName;
            loadTabData(tabName);
        }

        window.onload = () => switchTab('Active Prospects');
    </script>
</body>
</html>
