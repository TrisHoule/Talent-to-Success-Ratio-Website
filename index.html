 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talent-to-Success Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">

    <header class="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold tracking-wider text-blue-400">TALENT-TO-SUCCESS DB</h1>
            
            <div class="flex space-x-2 bg-gray-900 p-1 rounded-lg border border-gray-700">
                <button onclick="switchTab('DB_Prospects')" id="btn-DB_Prospects" class="tab-btn px-4 py-2 rounded-md font-semibold text-sm transition bg-blue-600 text-white">Prospects</button>
                <button onclick="switchTab('DB_Major_Leaguers')" id="btn-DB_Major_Leaguers" class="tab-btn px-4 py-2 rounded-md font-semibold text-sm transition text-gray-400 hover:text-white">Major Leaguers</button>
                <button onclick="switchTab('DB_Historical')" id="btn-DB_Historical" class="tab-btn px-4 py-2 rounded-md font-semibold text-sm transition text-gray-400 hover:text-white">Historical</button>
            </div>

            <div class="flex items-center gap-3 w-full md:w-auto">
                <input type="text" id="searchInput" oninput="searchPlayers()" placeholder="Search players..." class="bg-gray-700 text-white px-4 py-2 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 w-full md:w-64">
                <button onclick="openFormModal()" class="bg-green-600 hover:bg-green-500 text-white font-bold px-4 py-2 rounded-md transition whitespace-nowrap">+ Add Player</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-6">
        <div class="overflow-x-auto bg-gray-800 rounded-lg shadow-xl border border-gray-700">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-700 text-gray-300 uppercase text-xs tracking-wider border-b border-gray-600">
                        <th class="p-4">Name</th>
                        <th class="p-4">Position</th>
                        <th class="p-4">Org / Team</th>
                        <th class="p-4">Tier / Status</th>
                        <th class="p-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="playerTableBody" class="divide-y divide-gray-700">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="formModal" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center hidden z-50 p-4">
        <div class="bg-gray-800 rounded-lg max-w-lg w-full p-6 border border-gray-700 shadow-2xl relative">
            <h2 id="modalTitle" class="text-xl font-bold mb-4 text-blue-400">Add New Player</h2>
            
            <form id="playerForm" onsubmit="handleFormSubmit(event)" class="space-y-4">
                <input type="hidden" id="player-id">
                
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Full Name</label>
                    <input type="text" id="player-name" required class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">Position</label>
                        <input type="text" id="player-position" required class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label id="lbl-org" class="block text-sm font-medium text-gray-400 mb-1">Organization</label>
                        <input type="text" id="player-org" required class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>
                <div>
                    <label id="lbl-tier" class="block text-sm font-medium text-gray-400 mb-1">Tier / Ranking</label>
                    <input type="text" id="player-tier" required class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div class="flex justify-end space-x-3 pt-4 border-t border-gray-700">
                    <button type="button" onclick="closeFormModal()" class="px-4 py-2 bg-gray-600 hover:bg-gray-500 text-white rounded transition">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded transition">Save Player</button>
                </div>
            </form>
        </div>
    </div>

<script>
        const API_BASE = "https://sheetdb.io/api/v1/xxcu38ri2nudv"; 
        let currentTab = "DB_Prospects";
        let allPlayersData = [];

        // Fetch data from the selected Sheet tab
        async function fetchTabData() {
            const tbody = document.getElementById('playerTableBody');
            tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-gray-400 animate-pulse">Loading dataset from spreadsheet...</td></tr>`;
            
            // Adjust modal label hints dynamically based on sheet schema context
            document.getElementById('lbl-org').innerText = currentTab === "DB_Prospects" ? "Organization" : "Team";
            document.getElementById('lbl-tier').innerText = currentTab === "DB_Historical" ? "Status" : "Tier";

            try {
                const response = await fetch(`${API_BASE}?sheet=${currentTab}`);
                
                // Diagnostic check to see what SheetDB says
                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`Status ${response.status}: ${errText}`);
                }

                allPlayersData = await response.json();
                renderTable(allPlayersData);
            } catch (error) {
                // Displays the exact raw error in the table body for debugging
                tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-red-400 font-mono text-sm">
                    Failed to load data.<br>Error Details: ${error.message}<br><br>
                    <span class="text-gray-400 text-xs">Verify that your Google Sheet tab is named exactly: "${currentTab}" (case-sensitive)</span>
                </td></tr>`;
            }
        }

        // Render dataset to UI table rows
        function renderTable(data) {
            const tbody = document.getElementById('playerTableBody');
            tbody.innerHTML = "";

            if (!Array.isArray(data) || data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-gray-500">No matching players found.</td></tr>`;
                return;
            }

            data.forEach(player => {
                const name = player.Name || player.name || "Unknown";
                const pos = player.Position || player.position || "-";
                const org = player.Organization || player.Team || player.organization || player.team || "-";
                const tier = player.Tier || player.tier || player.Status || player.status || "-";
                const id = player.id || player.Id;

                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-700/50 transition duration-150";
                tr.innerHTML = `
                    <td class="p-4 font-semibold text-white">${name}</td>
                    <td class="p-4 text-gray-300">${pos}</td>
                    <td class="p-4 text-gray-300">${org}</td>
                    <td class="p-4"><span class="px-2 py-1 bg-gray-900 rounded border border-gray-600 text-xs font-mono text-blue-300">${tier}</span></td>
                    <td class="p-4 text-right">
                        <button onclick="editPlayer('${id}')" class="text-sm bg-blue-600/20 text-blue-400 hover:bg-blue-600 hover:text-white border border-blue-500/30 px-3 py-1 rounded transition">Edit</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Tab selection logic
        function switchTab(tabName) {
            currentTab = tabName;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('text-gray-400', 'hover:text-white');
            });
            document.getElementById(`btn-${tabName}`).classList.add('bg-blue-600', 'text-white');
            document.getElementById('searchInput').value = "";
            fetchTabData();
        }

        // Live client-side processing search filter
        function searchPlayers() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allPlayersData.filter(p => {
                const name = (p.Name || p.name || "").toLowerCase();
                const org = (p.Organization || p.Team || p.organization || p.team || "").toLowerCase();
                return name.includes(query) || org.includes(query);
            });
            renderTable(filtered);
        }

        // Modal Management
        function openFormModal(isEdit = false) {
            document.getElementById('modalTitle').innerText = isEdit ? "Modify Entry Profile" : "Add Player Record";
            document.getElementById('formModal').classList.remove('hidden');
        }

        // Close form modal clear values
        function closeFormModal() {
            document.getElementById('formModal').classList.add('hidden');
            document.getElementById('playerForm').reset();
            document.getElementById('player-id').value = "";
        }

        // Populate form data to execute updates
        function editPlayer(id) {
            const player = allPlayersData.find(p => (p.id || p.Id) == id);
            if (!player) return;

            document.getElementById('player-id').value = id;
            document.getElementById('player-name').value = player.Name || player.name || "";
            document.getElementById('player-position').value = player.Position || player.position || "";
            document.getElementById('player-org').value = player.Organization || player.Team || player.organization || player.team || "";
            document.getElementById('player-tier').value = player.Tier || player.tier || player.Status || player.status || "";

            openFormModal(true);
        }

        // Intercept form submissions for Create / Update transactions
        async function handleFormSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('player-id').value;
            
            const payload = {
                Name: document.getElementById('player-name').value,
                Position: document.getElementById('player-position').value
            };

            if (currentTab === "DB_Prospects") {
                payload.Organization = document.getElementById('player-org').value;
            } else {
                payload.Team = document.getElementById('player-org').value;
            }

            if (currentTab === "DB_Historical") {
                payload.Status = document.getElementById('player-tier').value;
            } else {
                payload.Tier = document.getElementById('player-tier').value;
            }

            try {
                if (id) {
                    payload.id = id;
                    await fetch(`${API_BASE}/id/${id}?sheet=${currentTab}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ data: payload })
                    });
                } else {
                    payload.id = Date.now().toString(); 
                    await fetch(`${API_BASE}?sheet=${currentTab}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ data: [payload] })
                    });
                }
                closeFormModal();
                fetchTabData();
            } catch (err) {
                alert("Transaction failed. Check network panel.");
            }
        }

        window.onload = fetchTabData;
    </script>
</body>
</html>
