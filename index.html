<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talent-to-Success Player Database</title>
    <!-- Tailwind CSS for sleek dark styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .modal-transition {
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

    <!-- Header Navigation -->
    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <h1 class="text-xl font-bold tracking-tight bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                Talent-to-Success Database
            </h1>
            <nav class="flex gap-2 bg-slate-950 p-1 rounded-lg border border-slate-800">
                <button onclick="switchTab('Active Prospects')" id="btn-ActiveProspects" class="px-4 py-2 text-sm font-medium rounded-md transition nav-btn bg-blue-600 text-white">
                    Active Prospects
                </button>
                <button onclick="switchTab('Active Major Leaguers')" id="btn-ActiveMajorLeaguers" class="px-4 py-2 text-sm font-medium rounded-md transition nav-btn text-slate-400 hover:text-slate-200">
                    Active MLB
                </button>
                <button onclick="switchTab('Historical Archive (Inactives)')" id="btn-HistoricalArchive" class="px-4 py-2 text-sm font-medium rounded-md transition nav-btn text-slate-400 hover:text-slate-200">
                    Historical Archive
                </button>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- Tab Header Title -->
        <div class="mb-6 flex justify-between items-center">
            <h2 id="current-tab-title" class="text-2xl font-semibold text-slate-200">Active Prospects</h2>
            <div id="loading-indicator" class="text-sm text-blue-400 animate-pulse">Syncing data...</div>
        </div>

        <!-- Player Badges Grid Display -->
        <div id="player-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
            <!-- Dynamic players load here -->
        </div>
    </main>

    <!-- POP-OUT DETAILS MODAL BOX -->
    <div id="player-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm hidden opacity-0 modal-transition">
        <div class="bg-slate-900 border border-slate-800 rounded-xl w-full max-w-2xl overflow-hidden shadow-2xl transform scale-95 modal-transition" id="modal-card">
            
            <div id="modal-accent-bar" class="h-2 w-full bg-blue-500"></div>
            
            <div class="p-6">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h3 id="modal-player-name" class="text-2xl font-bold text-white">Player Name</h3>
                        <span id="modal-player-tier" class="inline-block mt-1 px-2.5 py-0.5 text-xs font-semibold rounded-full bg-slate-800 text-slate-300">Tier Info</span>
                    </div>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-white p-1 rounded-lg hover:bg-slate-800 transition">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>

                <hr class="border-slate-800 my-4">

                <!-- Dynamic Info Matrix -->
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-4 mb-6" id="modal-meta-grid">
                    <!-- Metrics load dynamically -->
                </div>

                <!-- Scouting Profile Text Box -->
                <div>
                    <h4 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Scouting Reports & Notes</h4>
                    <p id="modal-player-notes" class="text-sm text-slate-300 leading-relaxed bg-slate-950 p-4 rounded-lg border border-slate-800 max-h-60 overflow-y-auto">
                        Notes layout text goes here.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- PIPELINE ARCHITECTURE LOGIC -->
    <script>
        const BASE_API_URL = 'https://sheetdb.io/api/v1/im4sx1l1jcszt';
        let currentTab = 'Active Prospects';
        let localPlayersCache = [];

        // STRIP HYPERLINK FORMULAS: Extracts the real name from =HYPERLINK("url", "Name")
        function cleanPlayerName(rawName) {
            if (!rawName) return "";
            const text = String(rawName).trim();
            
            // Check if it's a formula string matching the hyperlink layout
            if (text.toUpperCase().startsWith("=HYPERLINK")) {
                // Regex matches the second string inside double quotes right before the closing parenthesis
                const matches = text.match(/text-slate-100|",\s*"([^"]+)"\s*\)$|",\s*"([^"]+)"\s*\)/i);
                if (matches) {
                    return matches[1] || matches[2] || text;
                }
                
                // Fallback splitting logic if regex misses complex URL characters
                try {
                    const parts = text.split(",");
                    if (parts.length > 1) {
                        let finalPart = parts[parts.length - 1].replace(/[")\s]/g, "");
                        if (finalPart) return finalPart;
                    }
                } catch(e) {}
            }
            return text;
        }

        // Dynamic Card / Badge Color Assignment
        function getTierColor(tierString) {
            if (!tierString) return { bg: 'bg-slate-800/40', text: 'text-slate-300', border: 'border-slate-700/60', hex: '#64748b' };
            const lower = tierString.toLowerCase();
            
            if (lower.includes('tier 1')) {
                return { bg: 'bg-amber-500/10', text: 'text-amber-400', border: 'border-amber-500/30', hex: '#f59e0b' };
            } else if (lower.includes('tier 2')) {
                return { bg: 'bg-emerald-500/10', text: 'text-emerald-400', border: 'border-emerald-500/30', hex: '#10b981' };
            } else if (lower.includes('tier 3')) {
                return { bg: 'bg-blue-500/10', text: 'text-blue-400', border: 'border-blue-500/30', hex: '#3b82f6' };
            } else if (lower.includes('tier 4')) {
                return { bg: 'bg-purple-500/10', text: 'text-purple-400', border: 'border-purple-500/30', hex: '#a855f7' };
            }
            return { bg: 'bg-slate-800/40', text: 'text-slate-300', border: 'border-slate-700/60', hex: '#64748b' };
        }

        // Fetch Pipeline Engine 
        async function loadTabData(tabName) {
            const loadingIndicator = document.getElementById('loading-indicator');
            const grid = document.getElementById('player-grid');
            
            loadingIndicator.classList.remove('hidden');
            grid.innerHTML = ''; 

            try {
                const cleanTabName = encodeURIComponent(tabName.trim());
                const targetUrl = `${BASE_API_URL}?sheet=${cleanTabName}&offset=8`;
                
                const response = await fetch(targetUrl);
                const data = await response.json();
                
                if (Array.isArray(data)) {
                    // Filter and process row items dynamically
                    localPlayersCache = data
                        .map(p => {
                            // Extract clean text names from formula items
                            p.CleanName = cleanPlayerName(p.Player);
                            return p;
                        })
                        .filter(p => p.CleanName !== "" && !p.CleanName.includes('#REF!') && !p.CleanName.toUpperCase().includes('PLAYER'));
                    
                    renderPlayerBadges();
                } else {
                    throw new Error("SheetDB data payload is not standard matrix array");
                }
            } catch (error) {
                console.error("Pipeline failure fetching SheetDB logs:", error);
                grid.innerHTML = `<div class="col-span-full p-6 text-center text-red-400 bg-red-950/20 border border-red-900 rounded-xl">Failed to synchronize sheet data lines. Verify tab structure.</div>`;
            } finally {
                loadingIndicator.classList.add('hidden');
            }
        }

        // Render minimalistic visual name badges
        function renderPlayerBadges() {
            const grid = document.getElementById('player-grid');
            grid.innerHTML = '';

            if (localPlayersCache.length === 0) {
                grid.innerHTML = `<div class="col-span-full p-8 text-center text-slate-500 border border-dashed border-slate-800 rounded-xl">No active player profiles found.</div>`;
                return;
            }

            localPlayersCache.forEach((player, index) => {
                const colors = getTierColor(player.Tier);
                
                const badge = document.createElement('div');
                badge.className = `p-3 rounded-xl border ${colors.bg} ${colors.border} hover:scale-[1.02] cursor-pointer transition-all duration-200 flex flex-col justify-between group h-24 shadow-sm hover:shadow-md`;
                badge.onclick = () => openModal(index);
                
                badge.innerHTML = `
                    <div class="font-semibold text-white group-hover:text-blue-400 transition text-sm sm:text-base line-clamp-2">${player.CleanName}</div>
                    <div class="text-[10px] font-bold uppercase tracking-wider ${colors.text} truncate mt-1">
                        ${player['Talent-to-Success Score'] ? 'Score: ' + player['Talent-to-Success Score'] : 'Unrated'}
                    </div>
                `;
                grid.appendChild(badge);
            });
        }

        // Display Pop-out Modal Details Box
        function openModal(index) {
            const player = localPlayersCache[index];
            const colors = getTierColor(player.Tier);
            
            document.getElementById('modal-accent-bar').style.backgroundColor = colors.hex;
            document.getElementById('modal-player-name').innerText = player.CleanName;
            document.getElementById('modal-player-tier').className = `inline-block mt-1 px-2.5 py-0.5 text-xs font-semibold rounded-full ${colors.bg} ${colors.text} border ${colors.border}`;
            document.getElementById('modal-player-tier').innerText = player.Tier || 'Unclassified Profile';
            document.getElementById('modal-player-notes').innerText = player.Notes || 'No scouting notes available.';

            const metaGrid = document.getElementById('modal-meta-grid');
            metaGrid.innerHTML = '';

            const dataKeys = [
                { label: 'Talent-to-Success Score', val: player['Talent-to-Success Score'] },
                { label: 'Current Org', val: player['Current Org'] },
                { label: 'Drafted/Signed By', val: player['Drafted/Signed By'] },
                { label: 'Past Orgs', val: player['Past Orgs'] },
                { label: 'Current Standing', val: player['Current Prospect Standing'] },
                { label: 'Career MLB Stats', val: player['Career MLB Stats'] },
                { label: 'Highest Level Met', val: player['Highest Level'] },
                { label: 'Peak Board Placement', val: player['Peak Prospect Standing'] }
            ];

            dataKeys.forEach(metric => {
                if (metric.val && metric.val.trim() !== "" && metric.val !== "None" && !metric.val.includes('#REF!')) {
                    const block = document.createElement('div');
                    block.className = 'bg-slate-950/60 p-3 rounded-lg border border-slate-800/80';
                    block.innerHTML = `
                        <div class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">${metric.label}</div>
                        <div class="text-sm font-semibold text-slate-200 mt-0.5">${metric.val}</div>
                    `;
                    metaGrid.appendChild(block);
                }
            });

            const modal = document.getElementById('player-modal');
            const card = document.getElementById('modal-card');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                card.classList.remove('scale-95');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('player-modal');
            const card = document.getElementById('modal-card');
            
            modal.classList.add('opacity-0');
            card.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 250);
        }

        // Global Navigation Tab Manager
        function switchTab(tabName) {
            currentTab = tabName;
            document.getElementById('current-tab-title').innerText = tabName;
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.className = "px-4 py-2 text-sm font-medium rounded-md transition nav-btn text-slate-400 hover:text-slate-200";
            });

            const activeId = 'btn-' + tabName.replace(/[^a-zA-Z]/g, "");
            const activeBtn = document.getElementById(activeId);
            if (activeBtn) {
                activeBtn.className = "px-4 py-2 text-sm font-medium rounded-md transition nav-btn bg-blue-600 text-white";
            }

            loadTabData(tabName);
        }

        window.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
        document.getElementById('player-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('player-modal')) closeModal();
        });

        window.onload = () => {
            switchTab('Active Prospects');
        };
    </script>
</body>
</html>
